<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pointer</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <header>
            <div class="header-top">
                <span class="logo">🖱</span>
                <div>
                    <h1>Pointer</h1>
                    <p id="stats" class="stats">Click History</p>
                </div>
            </div>
        </header>

        <div id="banner" class="hidden">
            Pointer can&rsquo;t run on this page. Open a normal web page to use
            it.
        </div>

        <div id="controls">
            <button id="btn-back" title="Back (Alt + Left)">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <polyline points="15 18 9 12 15 6" />
                </svg>
                <span>Back</span>
            </button>
            <button id="btn-forward" title="Forward (Alt + Right)">
                <span>Next</span>
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <polyline points="9 18 15 12 9 6" />
                </svg>
            </button>
            <button id="btn-clear" class="btn-danger" title="Clear history">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
                <span>Clear</span>
            </button>
        </div>

        <ul id="history-list">
            <li class="empty">
                <div class="empty-icon">🎯</div>
                <p>No clicks recorded yet.</p>
                <p class="empty-hint">
                    Click on any text on the page to start.
                </p>
            </li>
        </ul>

        <footer>
            <kbd>Alt</kbd> + <kbd>&larr;</kbd> Back &nbsp;&middot;&nbsp;
            <kbd>Alt</kbd> + <kbd>&rarr;</kbd> Forward
        </footer>

        <script src="popup.js"></script>
    </body>
</html>
